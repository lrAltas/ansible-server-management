---
# dnf_repo_sync tasks - 支持定位位置、定时更新、清空重建、增量同步

# 1. 清空重建逻辑（从0开始）
- name: Clean local mirror when requested
  ansible.builtin.file:
    path: "{{ dnf_repo_sync_base_path }}"
    state: absent
  when:
    - (dnf_repo_sync_clean | bool) or (dnf_repo_sync_state == 'absent')
  tags: [clean, purge]

# 2. 安装必要包
- name: Install required packages
  ansible.builtin.package:
    name: "{{ dnf_repo_sync_packages | default(['dnf-utils', 'createrepo', 'rsync', 'firewalld']) }}"
    state: present
  when: dnf_repo_sync_state == 'present'
  tags: [packages]

# 3. 创建基础目录
- name: Ensure base directory exists
  ansible.builtin.file:
    path: "{{ dnf_repo_sync_base_path }}"
    state: directory
    owner: "{{ dnf_repo_sync_repo_owner }}"
    group: "{{ dnf_repo_sync_repo_group }}"
    mode: '0755'
  when: dnf_repo_sync_state == 'present'
  tags: [directories]

# 4. 主同步循环（支持自定义 local_path）
- name: Sync each source to its specified location
  block:
    - name: Create target directory for {{ item.key }}
      ansible.builtin.file:
        path: "{% if item.value.local_path is defined %}{{ item.value.local_path }}{% else %}{{ dnf_repo_sync_base_path }}/{{ item.key }}{% endif %}"
        state: directory
        owner: "{{ dnf_repo_sync_repo_owner }}"
        group: "{{ dnf_repo_sync_repo_group }}"
        mode: '0755'

    - name: Run reposync for {{ item.key }}
      ansible.builtin.command:
        cmd: >-
          reposync
          --repofrompath={{ item.key }},{{ item.value.upstream_url }}
          -r {{ item.key }}
          -p "{% if item.value.local_path is defined %}{{ item.value.local_path }}{% else %}{{ dnf_repo_sync_base_path }}/{{ item.key }}{% endif %}"
          {{ dnf_repo_sync_reposync_options }}
      register: sync_result
      changed_when: sync_result.rc == 0
      # 移除 creates 条件，每次都检查更新，更适合定时任务

    - name: Update metadata with createrepo
      ansible.builtin.command:
        cmd: createrepo --update "{% if item.value.local_path is defined %}{{ item.value.local_path }}{% else %}{{ dnf_repo_sync_base_path }}/{{ item.key }}{% endif %}"
      changed_when: false

  loop: "{{ dnf_repo_sync_sources | dict2items }}"
  when: dnf_repo_sync_state == 'present'
  tags: [sync, reposync]

# 5. 部署自动更新脚本 + cron
- name: Deploy auto-update script when scheduled updates are enabled
  block:
    - name: Create update script from template
      ansible.builtin.template:
        src: update-dnf-repos.sh.j2
        dest: /usr/local/bin/update-dnf-repos.sh
        owner: root
        group: root
        mode: '0755'

    - name: Create cron job for scheduled sync
      ansible.builtin.cron:
        name: "{{ dnf_repo_sync_cron_job_name }}"
        minute: "{{ dnf_repo_sync_cron_minute }}"
        hour: "{{ dnf_repo_sync_cron_hour }}"
        day: "{{ dnf_repo_sync_cron_day }}"
        month: "{{ dnf_repo_sync_cron_month }}"
        weekday: "{{ dnf_repo_sync_cron_weekday }}"
        job: "/usr/local/bin/update-dnf-repos.sh >> /var/log/dnf-repo-sync.log 2>&1"
        user: root
        state: present

    - name: Ensure log file exists
      ansible.builtin.file:
        path: /var/log/dnf-repo-sync.log
        state: touch
        owner: root
        group: root
        mode: '0644'
        modification_time: preserve
        access_time: preserve
  when:
    - dnf_repo_sync_auto_update | bool
    - dnf_repo_sync_state == 'present'
  tags: [cron, schedule, auto-update]

# 6. Web 服务、防火墙、SELinux
- name: Setup web server to serve the mirror
  block:
    - name: Install web server
      ansible.builtin.package:
        name: "{{ dnf_repo_sync_web_server }}"
        state: present

    - name: Start and enable web server
      ansible.builtin.service:
        name: "{{ dnf_repo_sync_web_server }}"
        state: started
        enabled: true
      notify: Restart web server

    - name: SELinux configuration
      ansible.posix.seboolean:
        name: httpd_can_network_connect
        state: true
        persistent: true
      when: ansible_selinux.status == 'enabled'
  when:
    - dnf_repo_sync_serve_repos | bool
    - dnf_repo_sync_state == 'present'
  tags: [web, serve]

- name: Configure firewall
  ansible.posix.firewalld:
    port: "{{ item }}"
    permanent: true
    state: enabled
    immediate: true
  loop: "{{ dnf_repo_sync_firewall_ports }}"
  when:
    - dnf_repo_sync_manage_firewall | bool
    - dnf_repo_sync_state == 'present'
  notify: Reload firewalld
  tags: [firewall]

- name: Completion message
  ansible.builtin.debug:
    msg: |
      ✅ dnf_repo_sync 完成！
      本地镜像位置: {{ dnf_repo_sync_base_path }}/
      {% if dnf_repo_sync_auto_update %} 已启用定时更新（每天 {{ dnf_repo_sync_cron_hour }}:{{ dnf_repo_sync_cron_minute }} 执行）{% endif %}
  when: dnf_repo_sync_state == 'present'
  tags: [info]
