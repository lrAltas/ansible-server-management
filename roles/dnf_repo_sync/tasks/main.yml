---
# dnf_repo_sync 主任务入口
# 已拆分为多个子任务文件，方便查看和维护

- name: Run pre-check and show plan
  ansible.builtin.include_tasks: check.yml

- name: Install packages
  ansible.builtin.include_tasks: packages.yml

- name: Create directories
  ansible.builtin.include_tasks: directories.yml

- name: Synchronize repositories (with progress feedback)
  ansible.builtin.include_tasks: sync.yml

- name: Setup scheduled updates
  ansible.builtin.include_tasks: cron.yml

- name: Configure web server
  ansible.builtin.include_tasks: web.yml

- name: Configure firewall
  ansible.builtin.include_tasks: firewall.yml

- name: Show completion summary
  ansible.builtin.include_tasks: summary.yml
