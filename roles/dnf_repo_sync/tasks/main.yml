---
# dnf_repo_sync tasks - supports from-scratch creation, clean, and upgrade of existing mirrors
# Fully idempotent. Sources defined as dict in defaults/vars.

- name: Handle CLEAN / PURGE when requested (dnf_repo_sync_clean=true or state=absent)
  ansible.builtin.file:
    path: "{{ dnf_repo_sync_base_path }}"
    state: absent
  when:
    - (dnf_repo_sync_clean | bool) or (dnf_repo_sync_state == 'absent')
  tags: [clean, purge, absent]

- name: Ensure required packages are installed (CentOS 9 / Rocky 9 / RHEL 9)
  ansible.builtin.package:
    name: "{{ dnf_repo_sync_packages }}"
    state: present
  when: dnf_repo_sync_state == 'present'
  tags: [packages, dnf]

- name: Create base mirror directory
  ansible.builtin.file:
    path: "{{ dnf_repo_sync_base_path }}"
    state: directory
    owner: "{{ dnf_repo_sync_repo_owner }}"
    group: "{{ dnf_repo_sync_repo_group }}"
    mode: '0755'
  when: dnf_repo_sync_state == 'present'
  tags: [directories, present]

# === Main sync loop for each source in the dict ===
- name: Sync each repository from the provided upstream_url (exact path mirroring)
  block:
    - name: Ensure local target directory exists for {{ item.key }}
      ansible.builtin.file:
        path: "{{ dnf_repo_sync_base_path }}/{{ item.key }}"
        state: directory
        owner: "{{ dnf_repo_sync_repo_owner }}"
        group: "{{ dnf_repo_sync_repo_group }}"
        mode: '0755'
      tags: [directories, present]

    - name: Synchronize packages + metadata from upstream (using direct URL)
      ansible.builtin.command:
        cmd: >-
          reposync
          --repofrompath={{ item.key }},{{ item.value.upstream_url }}
          -r {{ item.key }}
          -p {{ dnf_repo_sync_base_path }}/{{ item.key }}
          {{ dnf_repo_sync_reposync_options }}
        creates: "{{ dnf_repo_sync_base_path }}/{{ item.key }}/repodata/repomd.xml"
      register: sync_result
      changed_when: sync_result.rc == 0
      tags: [sync, reposync, present]
      # Note: 'creates' gives basic idempotency. Remove the creates line or use --force if you want to always check for updates.

    - name: Rebuild repository metadata (createrepo --update)
      ansible.builtin.command:
        cmd: createrepo --update {{ dnf_repo_sync_base_path }}/{{ item.key }}
      tags: [createrepo, metadata, present]
      changed_when: false

  loop: "{{ dnf_repo_sync_sources | dict2items }}"
  when: dnf_repo_sync_state == 'present'
  tags: [sync, present]

# === Web server, firewall, SELinux (only when serving) ===
- name: Install and start web server to serve the mirrored repos
  block:
    - name: Install web server package
      ansible.builtin.package:
        name: "{{ dnf_repo_sync_web_server }}"
        state: present

    - name: Ensure web server is running and enabled
      ansible.builtin.service:
        name: "{{ dnf_repo_sync_web_server }}"
        state: started
        enabled: true
      notify: Restart web server

    - name: Configure SELinux for web content (if enabled)
      ansible.posix.seboolean:
        name: httpd_can_network_connect
        state: true
        persistent: true
      when: ansible_selinux.status == 'enabled'
  when:
    - dnf_repo_sync_serve_repos | bool
    - dnf_repo_sync_state == 'present'
  tags: [web, nginx, httpd, serve]

- name: Open required firewall ports
  ansible.posix.firewalld:
    port: "{{ item }}"
    permanent: true
    state: enabled
    immediate: true
  loop: "{{ dnf_repo_sync_firewall_ports }}"
  when:
    - dnf_repo_sync_manage_firewall | bool
    - dnf_repo_sync_state == 'present'
  notify: Reload firewalld
  tags: [firewall]

- name: Show completion summary
  ansible.builtin.debug:
    msg: |
      ✅ dnf_repo_sync completed (state={{ dnf_repo_sync_state }}).
      Local mirror root: {{ dnf_repo_sync_base_path }}/
      {% if dnf_repo_sync_serve_repos %}
      Serve URL example: http://{{ ansible_host | default(ansible_default_ipv4.address) }}/repos/<repo-key>/
      {% endif %}
      Edit dnf_repo_sync_sources in defaults/vars/group_vars to change what gets mirrored.
  when: dnf_repo_sync_state == 'present'
  tags: [info, debug]
